apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tnext-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/telematiq/tnext_config.git
    targetRevision: HEAD
    path: argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: tnext
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
