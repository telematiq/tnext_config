apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tnext-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            cluster: https://kubernetes.default.svc
  template:
    metadata:
      name: 'tnext-{{env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/telematiq/tnext_config.git
        targetRevision: HEAD
        path: apps/tnext
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: '{{cluster}}'
        namespace: 'tnext'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
