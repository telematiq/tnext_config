apiVersion: v1
kind: Service
metadata:
  name: {{ include "tnext.fullname" . }}
  labels:
    {{- include "tnext.labels" . | nindent 4 }}
  annotations:
    tailscale.com/expose: "true"
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "tnext.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
