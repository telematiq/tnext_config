apiVersion: v1
kind: Service
metadata:
  name: whoami
  labels:
    app: whoami
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "whoshe"
    #tailscale.com/proxy-group: "my-proxy-group"
spec:
  type: ClusterIP
  selector:
    app: whoami
  ports:
    - name: http
      port: 80
      targetPort: 80
